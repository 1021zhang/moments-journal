<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Moments" />
    <title>Moments Journal</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <input id="photoInput" class="file-input" type="file" accept="image/*" multiple aria-label="选择照片" />
    <input id="stickerInput" class="file-input" type="file" accept="image/png,image/jpeg,image/webp,image/*" aria-label="选择贴纸图片" />
    <input id="backupInput" class="file-input" type="file" accept=".zip,application/zip" aria-label="选择备份文件" />
    <script src="app.js"></script>
  </body>
</html>
